services:
  - type: web
    name: telegram-sesame-lock-backend
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_MODE
        value: webhook
      - key: TELEGRAM_CLEAR_WEBHOOK_ON_POLL
        value: "false"
      - key: SESAME_API_BASE_URL
        value: https://api.candyhouse.co/public
      - key: SESAME_RESULT_ATTEMPTS
        value: "8"
      - key: SESAME_RESULT_DELAY_MS
        value: "1200"
      - key: COMMAND_LOG_ENABLED
        value: "true"
      - key: WEBHOOK_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ALLOWED_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: SESAME_API_KEY
        sync: false
      - key: SESAME_DEVICE_UUID
        sync: false
      - key: SESAME_SECRET_KEY
        sync: false
